<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>TERMINAL_SNAKE // PROTOCOL_V4</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f5f5;
        --accent: #0d0d0d;
        --ui-font: "JetBrains Mono", monospace;
        --pixel: 2px;
      }

      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--accent);
        font-family: var(--ui-font);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        text-transform: uppercase;
      }

      .crt-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          rgba(255, 255, 255, 0) 50%,
          rgba(0, 0, 0, 0.04) 50%
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 100;
      }

      #hud {
        width: min(90vw, 480px);
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 8px 0;
        border-bottom: var(--pixel) solid var(--accent);
        margin-bottom: 8px;
      }

      .stat-group {
        display: flex;
        flex-direction: column;
      }
      .label {
        font-size: 9px;
        opacity: 0.6;
        letter-spacing: 1px;
      }
      .value {
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
      }

      #warp-badge {
        font-size: 9px;
        font-weight: 800;
        background: var(--accent);
        color: var(--bg);
        padding: 2px 6px;
        display: none;
        animation: warpPulse 0.6s infinite alternate;
      }
      @keyframes warpPulse {
        from {
          opacity: 0.7;
        }
        to {
          opacity: 1;
        }
      }

      #biome-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 40px;
        font-weight: 900;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
        white-space: nowrap;
        background: var(--bg);
        padding: 0 10px;
        border: var(--pixel) solid var(--accent);
      }
      .pulse-anim {
        animation: biomePulse 1.5s ease-out forwards;
      }
      @keyframes biomePulse {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.8);
        }
        20% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        80% {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(1.1);
        }
      }

      #game-container {
        position: relative;
        width: min(90vw, 480px);
        height: min(90vw, 480px);
        border: var(--pixel) solid var(--accent);
        background: #fff;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
      }

      #combo-popup {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 64px;
        font-weight: 900;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }

      #controls {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(2, 56px);
        gap: 8px;
      }
      .dpad-btn {
        width: 56px;
        height: 56px;
        border: var(--pixel) solid var(--accent);
        background: transparent;
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        font-family: var(--ui-font);
        transition:
          background 0.1s,
          color 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      .dpad-btn:active,
      .dpad-btn.pressed {
        background: var(--accent);
        color: var(--bg);
      }
      #btn-up {
        grid-column: 2;
        grid-row: 1;
      }
      #btn-left {
        grid-column: 1;
        grid-row: 2;
      }
      #btn-down {
        grid-column: 2;
        grid-row: 2;
      }
      #btn-right {
        grid-column: 3;
        grid-row: 2;
      }

      #game-over-overlay {
        position: absolute;
        inset: 0;
        background: var(--bg);
        z-index: 200;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 4px solid var(--accent);
        padding: 20px;
        text-align: center;
      }
      .terminal-header {
        font-size: 22px;
        border-bottom: var(--pixel) solid var(--accent);
        width: 100%;
        margin-bottom: 16px;
        padding-bottom: 8px;
      }
      .over-stats {
        margin: 16px 0;
        width: 100%;
        text-align: left;
      }
      .over-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 12px;
      }
      .restart-btn {
        margin-top: 16px;
        background: var(--accent);
        color: var(--bg);
        border: none;
        padding: 12px 32px;
        font-family: var(--ui-font);
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
      }
      .restart-btn:hover {
        opacity: 0.85;
      }

      @media (min-width: 600px) {
        #controls {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="crt-overlay"></div>
    <div id="biome-label">VOID</div>

    <div id="hud">
      <div class="stat-group">
        <span class="label">BIOME</span>
        <span id="biome-name" class="value">VOID</span>
        <span id="warp-badge">⚡ WARP</span>
      </div>
      <div class="stat-group" style="align-items: center">
        <span class="label">COMBO</span>
        <span id="combo-val" class="value">×1</span>
      </div>
      <div class="stat-group" style="align-items: center">
        <span class="label">SCORE</span>
        <span id="score-val" class="value">0000</span>
      </div>
      <div class="stat-group" style="align-items: flex-end">
        <span class="label">BEST</span>
        <span id="high-val" class="value">0000</span>
      </div>
    </div>

    <div id="game-container">
      <canvas id="gameCanvas"></canvas>
      <div id="combo-popup">×2</div>

      <div id="game-over-overlay">
        <div class="terminal-header">// GAME_OVER //</div>
        <div class="over-stats">
          <div class="over-row">
            <span>SCORE</span><span id="final-score">0</span>
          </div>
          <div class="over-row">
            <span>PEAK COMBO</span><span id="final-combo">×1</span>
          </div>
          <div class="over-row">
            <span>BIOME REACHED</span><span id="final-biome">VOID</span>
          </div>
          <div class="over-row">
            <span>WARP ACHIEVED</span><span id="final-warp">NO</span>
          </div>
          <div
            class="over-row"
            style="
              border-top: 2px solid var(--accent);
              padding-top: 8px;
              margin-top: 4px;
            "
          >
            <span>HIGH SCORE</span><span id="final-highscore">0</span>
          </div>
        </div>
        <button class="restart-btn" id="restart-from-overlay">RESTART</button>
      </div>
    </div>

    <div id="controls">
      <div id="btn-up" class="dpad-btn">▲</div>
      <div id="btn-left" class="dpad-btn">◀</div>
      <div id="btn-down" class="dpad-btn">▼</div>
      <div id="btn-right" class="dpad-btn">▶</div>
    </div>

    <script>
      const CONFIG = {
        GRID_SIZE: 20,
        INITIAL_SPEED: 140,
        MIN_SPEED: 45,
        OBSTACLE_COUNT: 5,
        GHOST_LENGTH: 8,
        COMBO_TIMEOUT: 5000,
        BIOME_STEP: 50,
        OBSTACLE_WARNING_MS: 3000,
        WARP_UNLOCK_SCORE: 150,
      };

      const BIOMES = [
        { name: "VOID", primary: "#0D0D0D", bg: "#F5F5F5", grid: "#E8E8E8" },
        { name: "TECH", primary: "#0055FF", bg: "#F0F5FF", grid: "#DDE8FF" },
        { name: "ACID", primary: "#FF0055", bg: "#FFF0F5", grid: "#FFDDE8" },
        { name: "GOLD", primary: "#FF9900", bg: "#FFF9F0", grid: "#FFF2DD" },
        { name: "MONO", primary: "#000000", bg: "#FFFFFF", grid: "#F2F2F2" },
      ];

      class AudioEngine {
        constructor() {
          this.ctx = null;
          this.enabled = false;
        }
        unlock() {
          if (this.ctx) return;
          try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.enabled = true;
          } catch (e) {
            this.enabled = false;
          }
        }
        _tone(freq, dur, type = "square", vol = 0.08) {
          if (!this.enabled || !this.ctx) return;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.type = type;
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(vol, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            this.ctx.currentTime + dur,
          );
          osc.start();
          osc.stop(this.ctx.currentTime + dur);
        }
        food() {
          this._tone(880, 0.08);
        }
        warning() {
          this._tone(330, 0.12, "sawtooth", 0.06);
        }
        biome() {
          this._tone(440, 0.12);
          setTimeout(() => this._tone(554, 0.12), 80);
          setTimeout(() => this._tone(659, 0.18), 160);
        }
        warpUnlock() {
          [220, 440, 660, 880].forEach((f, i) =>
            setTimeout(() => this._tone(f, 0.12), i * 60),
          );
        }
        death() {
          this._tone(220, 0.25, "sawtooth");
          setTimeout(() => this._tone(180, 0.3, "sawtooth"), 120);
          setTimeout(() => this._tone(140, 0.4, "sawtooth"), 280);
        }
      }
      const audio = new AudioEngine();

      class SnakeGame {
        constructor() {
          this.canvas = document.getElementById("gameCanvas");
          this.ctx = this.canvas.getContext("2d");
          this.highScore = parseInt(localStorage.getItem("snake_hs") || "0");
          document.getElementById("high-val").textContent = String(
            this.highScore,
          ).padStart(4, "0");

          this.obstacles = [];

          this.init();
          window.addEventListener("keydown", (e) => {
            audio.unlock();
            this.handleInput(e.key);
          });
          window.addEventListener("resize", () => this.resize());
          document
            .getElementById("restart-from-overlay")
            .addEventListener("click", () => {
              audio.unlock();
              this.init();
            });

          const dpadMap = {
            "btn-up": "ArrowUp",
            "btn-down": "ArrowDown",
            "btn-left": "ArrowLeft",
            "btn-right": "ArrowRight",
          };
          Object.entries(dpadMap).forEach(([id, key]) => {
            const btn = document.getElementById(id);
            const handler = (e) => {
              e.preventDefault();
              audio.unlock();
              this.handleInput(key);
              btn.classList.add("pressed");
              setTimeout(() => btn.classList.remove("pressed"), 120);
            };
            btn.addEventListener("touchstart", handler, { passive: false });
            btn.addEventListener("mousedown", handler);
          });
        }

        resize() {
          const size = Math.min(window.innerWidth * 0.9, 480);
          this.canvas.width = size;
          this.canvas.height = size;
          this.tileSize = size / CONFIG.GRID_SIZE;
        }

        init() {
          this.resize();
          document.getElementById("game-over-overlay").style.display = "none";

          this.obstacles = [];
          this.snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 },
          ];
          this.ghostTrail = [];
          this.direction = { x: 1, y: 0 };
          this.nextDirection = { x: 1, y: 0 };
          this.food = this.spawnItem();
          this.genObstacles();

          this.score = 0;
          this.combo = 1;
          this.peakCombo = 1;
          this.lastFoodTime = 0;
          this.speed = CONFIG.INITIAL_SPEED;
          this.isGameOver = false;
          this.currentBiomeIdx = 0;
          this.obsRegenTimer = null;
          this.isWarning = false;
          this.warpMode = false;
          this.warpAchieved = false;

          this.updateUI();
          this.updateTheme();
          if (this.loop) clearTimeout(this.loop);
          this.run();
        }

        spawnItem() {
          let pos;
          do {
            pos = {
              x: Math.floor(Math.random() * CONFIG.GRID_SIZE),
              y: Math.floor(Math.random() * CONFIG.GRID_SIZE),
            };
          } while (
            this.snake.some((s) => s.x === pos.x && s.y === pos.y) ||
            this.obstacles.some((o) => o.x === pos.x && o.y === pos.y)
          );
          return pos;
        }

        genObstacles() {
          this.obstacles = [];
          for (let i = 0; i < CONFIG.OBSTACLE_COUNT; i++) {
            this.obstacles.push(this.spawnItem());
          }
          this.isWarning = false;
        }

        handleInput(key) {
          const keyMap = {
            ArrowUp: { x: 0, y: -1 },
            w: { x: 0, y: -1 },
            ArrowDown: { x: 0, y: 1 },
            s: { x: 0, y: 1 },
            ArrowLeft: { x: -1, y: 0 },
            a: { x: -1, y: 0 },
            ArrowRight: { x: 1, y: 0 },
            d: { x: 1, y: 0 },
          };
          const move = keyMap[key];
          if (
            move &&
            !(move.x === -this.direction.x && move.y === -this.direction.y)
          ) {
            this.nextDirection = move;
          }
        }

        update() {
          if (this.isGameOver) return;

          this.direction = this.nextDirection;
          let head = {
            x: this.snake[0].x + this.direction.x,
            y: this.snake[0].y + this.direction.y,
          };

          if (this.warpMode) {
            head.x = (head.x + CONFIG.GRID_SIZE) % CONFIG.GRID_SIZE;
            head.y = (head.y + CONFIG.GRID_SIZE) % CONFIG.GRID_SIZE;
          } else {
            if (
              head.x < 0 ||
              head.x >= CONFIG.GRID_SIZE ||
              head.y < 0 ||
              head.y >= CONFIG.GRID_SIZE
            ) {
              this.gameOver();
              return;
            }
          }

          if (
            this.snake.some((s) => s.x === head.x && s.y === head.y) ||
            this.obstacles.some((o) => o.x === head.x && o.y === head.y)
          ) {
            this.gameOver();
            return;
          }

          this.ghostTrail.unshift({ ...this.snake[0] });
          if (this.ghostTrail.length > CONFIG.GHOST_LENGTH)
            this.ghostTrail.pop();

          this.snake.unshift(head);
          if (head.x === this.food.x && head.y === this.food.y) {
            this.handleFood();
          } else {
            this.snake.pop();
          }

          this.speed = Math.max(
            CONFIG.MIN_SPEED,
            CONFIG.INITIAL_SPEED - this.score / 2,
          );

          if (
            this.lastFoodTime &&
            Date.now() - this.lastFoodTime > CONFIG.COMBO_TIMEOUT
          ) {
            this.combo = 1;
            this.updateUI();
          }

          const newIdx = Math.min(
            BIOMES.length - 1,
            Math.floor(this.score / CONFIG.BIOME_STEP),
          );
          if (newIdx !== this.currentBiomeIdx) {
            this.currentBiomeIdx = newIdx;
            this.triggerBiomeTransition();
          }

          if (!this.warpMode && this.score >= CONFIG.WARP_UNLOCK_SCORE) {
            this.warpMode = true;
            this.warpAchieved = true;
            document.getElementById("warp-badge").style.display = "block";
            audio.warpUnlock();
          }
        }

        handleFood() {
          const now = Date.now();
          if (
            this.lastFoodTime &&
            now - this.lastFoodTime < CONFIG.COMBO_TIMEOUT
          ) {
            this.combo = Math.min(5, this.combo + 1);
            this.peakCombo = Math.max(this.peakCombo, this.combo);
            this.showComboPop();
          } else {
            this.combo = 1;
          }
          this.score += 10 * this.combo;
          this.lastFoodTime = now;
          this.food = this.spawnItem();
          this.updateUI();
          audio.food();

          if (this.obsRegenTimer) clearTimeout(this.obsRegenTimer);
          this.isWarning = true;
          audio.warning();
          this.obsRegenTimer = setTimeout(() => {
            this.genObstacles();
            this.isWarning = false;
          }, CONFIG.OBSTACLE_WARNING_MS);
        }

        triggerBiomeTransition() {
          const label = document.getElementById("biome-label");
          label.innerText = BIOMES[this.currentBiomeIdx].name;
          label.classList.remove("pulse-anim");
          void label.offsetWidth;
          label.classList.add("pulse-anim");
          document.getElementById("biome-name").innerText =
            BIOMES[this.currentBiomeIdx].name;
          this.updateTheme();
          audio.biome();
        }

        updateTheme() {
          const b = BIOMES[this.currentBiomeIdx];
          document.documentElement.style.setProperty("--accent", b.primary);
          document.documentElement.style.setProperty("--bg", b.bg);
        }

        showComboPop() {
          const pop = document.getElementById("combo-popup");
          pop.innerText = `×${this.combo}`;
          pop.style.color = BIOMES[this.currentBiomeIdx].primary;
          pop.style.opacity = "1";
          setTimeout(() => {
            pop.style.opacity = "0";
          }, 350);
        }

        updateUI() {
          document.getElementById("score-val").innerText = String(
            this.score,
          ).padStart(4, "0");
          document.getElementById("combo-val").innerText = `×${this.combo}`;
        }

        draw() {
          const b = BIOMES[this.currentBiomeIdx];
          const ts = this.tileSize;

          this.ctx.fillStyle = b.bg;
          this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

          this.ctx.strokeStyle = b.grid;
          this.ctx.lineWidth = 0.5;
          for (let i = 0; i <= CONFIG.GRID_SIZE; i++) {
            this.ctx.beginPath();
            this.ctx.moveTo(i * ts, 0);
            this.ctx.lineTo(i * ts, this.canvas.height);
            this.ctx.stroke();
            this.ctx.beginPath();
            this.ctx.moveTo(0, i * ts);
            this.ctx.lineTo(this.canvas.width, i * ts);
            this.ctx.stroke();
          }

          if (this.warpMode) {
            this.ctx.save();
            this.ctx.strokeStyle = b.primary;
            this.ctx.lineWidth = 3;
            this.ctx.setLineDash([6, 4]);
            this.ctx.globalAlpha = 0.35;
            this.ctx.strokeRect(
              1,
              1,
              this.canvas.width - 2,
              this.canvas.height - 2,
            );
            this.ctx.restore();
          }

          const pulse = (Math.sin(Date.now() / 90) + 1) / 2;
          this.obstacles.forEach((o) => {
            this.ctx.fillStyle = this.isWarning
              ? `rgba(${this.isWarning && pulse > 0.6 ? "30,30,30" : "200,200,200"},1)`
              : "#D8D8D8";
            this.ctx.fillRect(o.x * ts, o.y * ts, ts, ts);
            this.ctx.strokeStyle = b.primary;
            this.ctx.lineWidth = 1.5;
            this.ctx.strokeRect(o.x * ts + 2, o.y * ts + 2, ts - 4, ts - 4);
          });

          // Ghost trail
          this.ghostTrail.forEach((pos, i) => {
            this.ctx.fillStyle = b.primary;
            this.ctx.globalAlpha = (1 - i / CONFIG.GHOST_LENGTH) * 0.12;
            this.ctx.fillRect(pos.x * ts, pos.y * ts, ts, ts);
          });
          this.ctx.globalAlpha = 1;

          const foodVisible = Math.sin(Date.now() / 200) > 0;
          if (foodVisible) {
            this.ctx.fillStyle = b.primary;
            this.ctx.fillRect(this.food.x * ts, this.food.y * ts, ts, ts);
            this.ctx.fillStyle = b.bg;
            this.ctx.fillRect(
              this.food.x * ts + ts * 0.3,
              this.food.y * ts + ts * 0.3,
              ts * 0.4,
              ts * 0.4,
            );
          }

          this.snake.forEach((s, i) => {
            this.ctx.fillStyle = i === 0 ? b.primary : "#FFFFFF";
            this.ctx.fillRect(s.x * ts, s.y * ts, ts, ts);
            if (i > 0) {
              this.ctx.strokeStyle = b.grid;
              this.ctx.lineWidth = 0.5;
              this.ctx.strokeRect(s.x * ts, s.y * ts, ts, ts);
            }
          });
        }

        gameOver() {
          this.isGameOver = true;
          audio.death();
          this.highScore = Math.max(this.score, this.highScore);
          localStorage.setItem("snake_hs", this.highScore);
          document.getElementById("high-val").textContent = String(
            this.highScore,
          ).padStart(4, "0");
          document.getElementById("final-score").textContent = this.score;
          document.getElementById("final-combo").textContent =
            `×${this.peakCombo}`;
          document.getElementById("final-biome").textContent =
            BIOMES[this.currentBiomeIdx].name;
          document.getElementById("final-warp").textContent = this.warpAchieved
            ? "YES ⚡"
            : "NO";
          document.getElementById("final-highscore").textContent =
            this.highScore;
          document.getElementById("game-over-overlay").style.display = "flex";
        }

        run() {
          this.update();
          this.draw();
          if (!this.isGameOver) {
            this.loop = setTimeout(() => this.run(), this.speed);
          }
        }
      }

      const game = new SnakeGame();
    </script>
  </body>
</html>
